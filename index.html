<!doctype html>
<html lang="fa" dir="rtl">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Email Campaign</title>

<meta property="og:title" content="UK email campaign">
<meta property="og:description" content="Send email to UK parliament members">
<meta property="og:image" content="https://LionSunRevolution2026.github.io/FreeIran-UK/UK.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://LionSunRevolution2026.github.io/FreeIran-UK/">

<style>
:root{
--bg0:#07131c; --bg1:#071a26; --bg2:#061018;
--card0:#0e2533; --card1:#0b1f2c;
--border:rgba(255,255,255,.10);
--text:#e8f2ff;
--muted:rgba(232,242,255,.78);
--accent:#e07a5f;
--info0:rgba(224,122,95,.10);
--info1:rgba(224,122,95,.25);
--inputBg:rgba(255,255,255,.06);
}

*{box-sizing:border-box}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
max-width:980px;
margin:34px auto;
padding:0 16px 30px;
line-height:1.6;
color:var(--text);
background:
radial-gradient(1200px 700px at 20% 10%, rgba(47,192,214,.10), transparent 55%),
radial-gradient(900px 600px at 80% 0%, rgba(60,120,255,.10), transparent 50%),
linear-gradient(180deg, var(--bg1), var(--bg0) 55%, var(--bg2));
}

.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;}
.titleRow{display:flex;align-items:center;gap:12px;}

.badgeIcon{
width:55px;height:55px;font-size:35px;border-radius:12px;
display:inline-flex;align-items:center;justify-content:center;
background:rgba(255,255,255,.06);
border:1px solid var(--border);
box-shadow:0 10px 24px rgba(0,0,0,.35);
}

h1{margin:0;font-size:32px;letter-spacing:.2px}
.subtitle{margin:4px 0 0;color:var(--muted);white-space:pre-line}

button{
display:inline-flex;align-items:center;justify-content:center;
padding:12px 14px;border-radius:14px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.06);
color:#fff;font-weight:800;cursor:pointer;
}

button:disabled{opacity:.5;cursor:not-allowed}

.langBtn{padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.04);}

.card{
background:
linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)),
linear-gradient(180deg, var(--card0), var(--card1));
border:1px solid var(--border);
border-radius:22px;padding:16px;margin:14px 0;
box-shadow:0 22px 60px rgba(0,0,0,.55),0 1px 0 rgba(255,255,255,.05) inset;
}

.emailTextCard pre{
margin:10px 0 0;
white-space:pre-wrap;
background:rgba(0,0,0,.18);
border:1px solid rgba(255,255,255,.10);
border-radius:14px;
padding:14px;
color:rgba(232,242,255,.94);
line-height:1.7;
}

.signatureCard{background:var(--info0);border:1px solid var(--info1);}
.signatureTitle{margin:0 0 8px;font-size:20px;}
.signatureText{color:var(--muted);margin:0 0 12px;white-space:pre-line;}

.inputWrap{display:flex;flex-direction:column;gap:8px;}
.label{font-weight:700;}

.nameInput{
width:100%;
padding:14px 16px;
border-radius:14px;
border:1px solid rgba(255,255,255,.14);
background:var(--inputBg);
color:var(--text);
font-size:16px;
outline:none;
}

.nameInput::placeholder{color:rgba(232,242,255,.45);}
.inputHint{color:var(--muted);font-size:.95rem;margin:0;}

.panel{
border-radius:22px;
padding:16px;
border:1px solid var(--border);
background:rgba(255,255,255,.03);
position:relative;
overflow:hidden;
box-shadow:0 18px 44px rgba(0,0,0,.42);
margin-top:14px;
}

.panelHeader{display:flex;justify-content:space-between;align-items:flex-start;}

.panelTitle{margin:0;font-size:22px;}

.sendBtn{
width:100%;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.16);
font-size:16px;
}

.mono{
font-family:ui-monospace,Menlo,Consolas,monospace;
word-break:break-word;
}

pre.mono{
white-space:pre-wrap;
background:rgba(0,0,0,.22);
border:1px solid rgba(255,255,255,.10);
border-radius:14px;
padding:12px;
margin:10px 0 0;
}

.files{margin-top:10px;color:var(--muted);font-size:.95rem}

</style>
</head>

<body>

<div class="topbar">
<div class="titleRow">
<div class="badgeIcon">🕊️</div>
<div>
<h1 id="pageTitle"></h1>
<div class="subtitle" id="pageSubtitle"></div>
</div>
</div>
<button id="langBtn" class="langBtn" type="button"></button>
</div>

<div class="card emailTextCard">
<h2 id="aboutTitle"></h2>
<pre id="aboutText"></pre>
</div>

<div class="card signatureCard">
<h2 class="signatureTitle" id="signatureTitle"></h2>
<p class="signatureText" id="signatureNote"></p>

<div class="inputWrap">
<label class="label" id="nameLabel" for="fullName"></label>
<input id="fullName" class="nameInput" type="text" autocomplete="name"/>
<p class="inputHint" id="nameHint"></p>
</div>
</div>

<section class="panel">

<h2 class="panelTitle" id="panelTitle"></h2>

<button class="sendBtn" id="sendBtn" disabled></button>

<div>
<b id="previewSubjectLabel"></b>
<span class="mono" id="previewSubject"></span>
</div>

<pre class="mono" id="previewBody"></pre>

<div class="files" id="files"></div>

</section>

<script>

let LANG="fa"

const UI={

fa:{
dir:"rtl",
title:"کمپین ایمیل بریتانیا",
subtitle:"با یک کلیک پیش‌نویس ایمیل باز می‌شود.\nاولین گیرنده در To و بقیه در Bcc قرار می‌گیرند.",

aboutTitle:"ترجمه متن ایمیل",

aboutText:`موضوع: آزادی و دموکراسی برای ایران

نمایندگان محترم پارلمان،
تصمیم‌گیرندگان گرامی،

به عنوان شهروندی با ریشه ایرانی که در بریتانیا زندگی می‌کنم، با یک درخواست سیاسی مهم با شما تماس می‌گیرم.

با توجه به تلاش‌های مستمر مردم ایران برای دستیابی به آزادی و حاکمیت قانون، از شما درخواست می‌کنم که از این روند تاریخی گذار تا پایان کامل جمهوری اسلامی به طور قاطع و بدون کاهش حمایت کنید.

در عین حال بر حفظ کامل تمامیت ارضی ایران تأکید می‌کنم.

برای تضمین یک دوره گذار پایدار و جلوگیری از خلأ قدرت، نقش محوری شاهزاده رضا پهلوی در هدایت گذار دموکراتیک بسیار مهم است.

از شما درخواست می‌کنم در چارچوب مسئولیت‌های خود از آزادی، حقوق بشر و آرمان‌های دموکراتیک مردم ایران حمایت کنید.`,

signatureTitle:"امضای شما",

signatureNote:
"لطفاً نام خود را برای امضا وارد کنید تا به ایمیل اعتبار بیشتری بدهد.\nما هیچ‌کدام از این اطلاعات را ذخیره نمی‌کنیم.\nمی‌توانید متن ایمیل را کمی تغییر دهید تا کاملاً تکراری نباشد.\nاگر برای کشورهای دیگر هم به این پلتفرم نیاز دارید به ما اطلاع دهید.",

nameLabel:"نام کامل",
namePlaceholder:"نام خود را اینجا بنویسید",
nameHint:"این قسمت اختیاری است.",

toggle:"🌐 EN",

panelTitle:"ارسال ایمیل به اعضای پارلمان بریتانیا",

sendBtn:"ارسال ایمیل",

subjectLabel:"موضوع:"

},

en:{
dir:"ltr",

title:"UK email campaign",

subtitle:
"One click opens a ready email draft.\nThe first recipient goes to To and the others to Bcc.",

aboutTitle:"Translation of the email message",

aboutText:`Subject: Freedom and democracy for Iran

Dear Members of Parliament,
Dear Decision Makers,

As a citizen of Iranian origin residing in the United Kingdom, I am writing with an urgent political request.

In light of the continued efforts of the Iranian people for freedom and the rule of law, I call for clear and consistent support for this historic democratic transition until the complete end of the Islamic Republic.

Iran’s territorial integrity must remain intact and any future political system must reflect the sovereign will of the Iranian people.

Many Iranians support Crown Prince Reza Pahlavi as a central figure in guiding a democratic transition.

I respectfully urge the United Kingdom to support the freedom, human rights, and democratic aspirations of the Iranian people.`,

signatureTitle:"Your signature",

signatureNote:
"Please write your name for the signature to give more value to the email.\nWe do not store your name or any data anywhere.\nFeel free to slightly adjust the email text so messages are not completely identical.\nIf you would like to use this platform for other countries, please let us know.",

nameLabel:"Full name",
namePlaceholder:"Write your name here",
nameHint:"This field is optional.",

toggle:"🌐 FA",

panelTitle:"Send email to members of the UK Parliament",

sendBtn:"Send email",

subjectLabel:"Subject:"

}

}

const PANEL={mailFile:"mail1.txt",msgFile:"message1.txt",emails:[],subject:"",body:"",loaded:false}

function setLang(lang){

LANG=lang
const t=UI[lang]

document.documentElement.dir=t.dir
document.title=t.title

pageTitle.textContent=t.title
pageSubtitle.textContent=t.subtitle
aboutTitle.textContent=t.aboutTitle
aboutText.textContent=t.aboutText

signatureTitle.textContent=t.signatureTitle
signatureNote.textContent=t.signatureNote
nameLabel.textContent=t.nameLabel
fullName.placeholder=t.namePlaceholder
nameHint.textContent=t.nameHint

panelTitle.textContent=t.panelTitle
sendBtn.textContent=t.sendBtn

previewSubjectLabel.textContent=t.subjectLabel

langBtn.textContent=t.toggle

}

langBtn.onclick=()=>{

if(LANG==="fa") setLang("en")
else setLang("fa")

}

function normalizeEmails(text){
return text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean)
}

function parseMessage(text){
const subjectLine=text.match(/^SUBJECT:\s*(.*)$/m)
const bodySplit=text.split(/^\s*BODY:\s*$/m)
return{
subject:subjectLine?subjectLine[1].trim():"",
body:bodySplit.length>1?bodySplit.slice(1).join("\n").trim():""
}
}

function getSignedBody(body){
const name=fullName.value.trim()
if(!name) return body
return body+"\n\n"+name
}

function buildMailto(emails,subject,body){

const to=emails[0]||""
const bcc=emails.slice(1).join(",")

let url=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`

if(bcc) url+=`&bcc=${encodeURIComponent(bcc)}`

return url
}

async function loadPanel(){

const [mailRes,msgRes]=await Promise.all([
fetch(PANEL.mailFile),
fetch(PANEL.msgFile)
])

const mailTxt=await mailRes.text()
const msgTxt=await msgRes.text()

PANEL.emails=normalizeEmails(mailTxt)

const parsed=parseMessage(msgTxt)

PANEL.subject=parsed.subject
PANEL.body=parsed.body

previewSubject.textContent=PANEL.subject
previewBody.textContent=PANEL.body

sendBtn.disabled=false

}

sendBtn.onclick=()=>{

const finalBody=getSignedBody(PANEL.body)

window.location.href=buildMailto(
PANEL.emails,
PANEL.subject,
finalBody
)

}

setLang("fa")
loadPanel()

</script>

</body>
</html>
